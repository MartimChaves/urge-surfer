name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: bash tool/check_no_network.sh
      - run: flutter test
